<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>
  <!-- Subtle indigo border -->
  <rect width="100" height="100" rx="18" fill="none" stroke="#4f46e5" stroke-width="3" opacity="0.4"/>

  <!-- 3D depth layers (back → front) -->
  <text x="53" y="70" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="54" fill="#1e1b4b">AS</text>
  <text x="52" y="69" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="54" fill="#312e81">AS</text>
  <text x="51" y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="54" fill="#3730a3">AS</text>
  <text x="50" y="67" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="54" fill="#4f46e5">AS</text>

  <!-- Top face — gradient violet → indigo -->
  <text x="50" y="67" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="54" fill="url(#top)">AS</text>
</svg>
